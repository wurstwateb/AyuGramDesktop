name: Windows.

on:
  workflow_dispatch:

jobs:

  windows:
    name: Windows
    runs-on: windows-latest

    strategy:
      matrix:
        arch: [x64]
        qt: [qt6]
        generator: [""]

    env:
      UPLOAD_ARTIFACT: "true"
      ONLY_CACHE: "false"
      PREPARE_PATH: "Telegram/build/prepare/prepare.py"

    defaults:
      run:
        shell: cmd

    steps:
      - name: Configure Pagefile.
        uses: al-cheb/configure-pagefile-action@v1.4
        with:
          minimum-size: 32GB
          maximum-size: 32GB
          disk-root: "D:"

      - name: Show disk space.
        shell: pwsh
        run: Get-PSDrive -PSProvider FileSystem | Format-Table Name, @{n='UsedGB';e={[math]::Round($_.Used/1GB,1)}}, @{n='FreeGB';e={[math]::Round($_.Free/1GB,1)}}

      - name: Prepare directories.
        run: |
          mkdir %userprofile%\TBuild\Libraries
          mklink /d %GITHUB_WORKSPACE%\TBuild %userprofile%\TBuild
          echo TBUILD=%GITHUB_WORKSPACE%\TBuild>>%GITHUB_ENV%
          echo LibrariesPath=%GITHUB_WORKSPACE%\TBuild\Libraries${{ matrix.arch == 'x64' && '\win64' || '' }}>>%GITHUB_ENV%

      - name: Get repository name.
        shell: bash
        run: echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV

      - name: Clone.
        uses: actions/checkout@v7
        with:
          submodules: recursive
          path: ${{ env.TBUILD }}\${{ env.REPO_NAME }}

      - name: First set up.
        shell: bash
        run: |
          TBUILD_UNIX="$(cygpath -u "$USERPROFILE")/TBuild"
          PROGRAMFILES_UNIX="$(cygpath -u "$PROGRAMFILES")"
          DOCPATH="$TBUILD_UNIX/$REPO_NAME/docs/building-win-x64.md"
          SDK="$(grep "SDK version" "$DOCPATH" | sed -r 's/.*\*\*(.*)\*\* SDK version.*/\1/')"
          echo "SDK=$SDK" >> $GITHUB_ENV

          sed -i '/CMAKE_${lang}_FLAGS_DEBUG_INIT/s/${_Zi}//' "$PROGRAMFILES_UNIX"/CMake/share/cmake*/Modules/Platform/Windows-MSVC.cmake

          echo "$(sha256sum "$TBUILD_UNIX/$REPO_NAME/$PREPARE_PATH" | awk '{ print $1 }')" >> CACHE_KEY.txt
          echo "$SDK" >> CACHE_KEY.txt
          echo "release" >> CACHE_KEY.txt
          echo "CACHE_KEY=$(sha256sum CACHE_KEY.txt | awk '{ print $1 }')" >> $GITHUB_ENV

          echo "Configurate git for cherry-picks."
          git config --global user.email "you@example.com"
          git config --global user.name "Sample"

      - name: Install VS 2026 Build Tools.
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://aka.ms/vs/18/stable/vs_buildtools.exe -OutFile vs_buildtools.exe
          $p = Start-Process -FilePath .\vs_buildtools.exe -Wait -PassThru -ArgumentList `
            '--quiet','--wait','--norestart','--nocache', `
            '--add','Microsoft.VisualStudio.Workload.VCTools', `
            '--add','Microsoft.VisualStudio.Component.VC.Tools.ARM64', `
            '--add','Microsoft.VisualStudio.Component.VC.ATL.ARM64'
          Remove-Item vs_buildtools.exe -Force
          if ($p.ExitCode -ne 0 -and $p.ExitCode -ne 3010) { exit $p.ExitCode }

      - uses: Eden-CI/msvc-dev-cmd@master
        name: Native Tools Command Prompt.
        with:
          arch: ${{ matrix.arch }}
          sdk: ${{ env.SDK }}
          toolset: ${{ case(matrix.arch == 'arm64', '', '14.44') }}

      - name: NuGet sources.
        run: |
          nuget sources Disable -Name "Microsoft Visual Studio Offline Packages"
          nuget sources Add -Source https://api.nuget.org/v3/index.json & exit 0

      - name: ThirdParty cache.
        id: cache-third-party
        uses: actions/cache@v6
        with:
          path: ${{ env.TBUILD }}\ThirdParty
          key: ${{ runner.OS }}-${{ runner.arch }}-third-party-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-${{ runner.arch }}-third-party-

      - name: Libraries cache.
        id: cache-libs
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.LibrariesPath }}\*
            !${{ env.LibrariesPath }}\cache_keys
            !${{ env.LibrariesPath }}\[qQ]t[_-]*
            ${{ env.LibrariesPath }}\cache_keys\*
            !${{ env.LibrariesPath }}\cache_keys\[qQ]t[_-]*
          key: ${{ runner.OS }}-${{ matrix.arch }}-libs-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-${{ matrix.arch }}-libs-

      - name: Qt cache.
        id: cache-qt
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.LibrariesPath }}\[qQ]t[_-]*
            ${{ env.LibrariesPath }}\cache_keys\[qQ]t[_-]*
          key: ${{ runner.OS }}-${{ matrix.arch }}-${{ matrix.qt || 'qt' }}-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-${{ matrix.arch }}-${{ matrix.qt || 'qt' }}-

      - name: Libraries.
        id: libraries
        continue-on-error: true
        run: |
          %TBUILD%\%REPO_NAME%\Telegram\build\prepare\win.bat silent ${{ matrix.qt }}

      - name: Save ThirdParty cache before compiling.
        if: steps.cache-third-party.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ${{ env.TBUILD }}\ThirdParty
          key: ${{ runner.OS }}-${{ runner.arch }}-third-party-${{ env.CACHE_KEY }}

      - name: Save Libraries cache before compiling.
        if: always() && steps.cache-libs.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: |
            ${{ env.LibrariesPath }}\*
            !${{ env.LibrariesPath }}\cache_keys
            !${{ env.LibrariesPath }}\[qQ]t[_-]*
            ${{ env.LibrariesPath }}\cache_keys\*
            !${{ env.LibrariesPath }}\cache_keys\[qQ]t[_-]*
          key: ${{ runner.OS }}-${{ matrix.arch }}-libs-${{ env.CACHE_KEY }}

      - name: Save Qt cache before compiling.
        if: always() && steps.cache-qt.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: |
            ${{ env.LibrariesPath }}\[qQ]t[_-]*
            ${{ env.LibrariesPath }}\cache_keys\[qQ]t[_-]*
          key: ${{ runner.OS }}-${{ matrix.arch }}-${{ matrix.qt || 'qt' }}-${{ env.CACHE_KEY }}

      - name: Verify libraries.
        if: steps.libraries.outcome != 'success'
        run: exit /b 1

      - name: Read configuration matrix.
        shell: bash
        run: |
          ARTIFACT_NAME="AyuGram"

          ARCH=""
          if [ -n "${{ matrix.arch }}" ]; then
            case "${{ matrix.arch }}" in
              x64_x86) ARCH="x86";;
              arm64) ARCH="arm";;
              *) ARCH="${{ matrix.arch }}";;
            esac
            echo "Architecture from matrix: $ARCH"
            ARTIFACT_NAME="${ARTIFACT_NAME} ${{ matrix.arch }}"
          fi

          if [ -n "${{ matrix.qt }}" ]; then
            ARTIFACT_NAME="${ARTIFACT_NAME} ${{ matrix.qt }}"
          fi

          GENERATOR=""
          if [ -n "${{ matrix.generator }}" ]; then
            GENERATOR="-G \"${{ matrix.generator }}\""
            echo "Generator from matrix: $GENERATOR"
            ARTIFACT_NAME="${ARTIFACT_NAME} ${{ matrix.generator }}"
          fi
          echo "TDESKTOP_BUILD_GENERATOR=$GENERATOR" >> $GITHUB_ENV

          [ -n "$GENERATOR" ] && ARCH=""
          echo "TDESKTOP_BUILD_ARCH=$ARCH" >> $GITHUB_ENV

          DEFINE=""
          if [ -n "${{ matrix.defines }}" ]; then
            DEFINE="-D ${{ matrix.defines }}=ON"
            echo "Define from matrix: $DEFINE"
            ARTIFACT_NAME="${ARTIFACT_NAME} ${{ matrix.defines }}"
          fi
          echo "TDESKTOP_BUILD_DEFINE=$DEFINE" >> $GITHUB_ENV

          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

          API="-D TDESKTOP_API_ID=611335 -D TDESKTOP_API_HASH=d524b414d21f4d37f08684c1df41ac9c"
          echo "TDESKTOP_BUILD_API=$API" >> $GITHUB_ENV

      - name: Free up some disk space.
        shell: bash
        run: find "$(cygpath -u "$USERPROFILE")/TBuild/Libraries/win64" '(' '(' ! '(' -name '*.lib' -o -name '*.a' -o -name '*.exe' -o -name '*.h' -o -name '*.hpp' -o -name '*.inc' -o -name '*.cmake' -o -path '*/include/*' -o -path '*/objects-*' -o -path '*/cache_keys/*' -o -path '*/patches/*' ')' -type f ')' -o -empty ')' -delete

      - name: Patch build (cap MSVC parallelism + link Dnsapi + import qwindows).
        shell: bash
        run: |
          ROOT="$(cygpath -u "$USERPROFILE")/TBuild/$REPO_NAME"
          # Cap MSVC parallel compiles to 2 -> avoids C1060 "out of heap space" on CI runners.
          sed -i -E 's#/MP([[:space:]])#/MP2\1#' "$ROOT/cmake/options_win.cmake"
          # Qt 6.11 Qt6Network (qdnslookup_win) needs Windows DNS API -> link Dnsapi.lib into Telegram.
          sed -i 's#^        delayimp$#        delayimp\n        Dnsapi.lib#' "$ROOT/Telegram/CMakeLists.txt"
          # qwindows.lib is present but its plugin-registration object gets stripped by the linker,
          # so the QPA "windows" platform plugin is missing at runtime. Force-import it via a
          # directly-compiled TU (kept by the linker) that references the static plugin symbol.
          printf '#include <QtPlugin>\nQ_IMPORT_PLUGIN(QWindowsIntegrationPlugin)\nQ_IMPORT_PLUGIN(QSchannelBackend)\nQ_IMPORT_PLUGIN(QNetworkListManagerNetworkInformationBackendFactory)\nQ_IMPORT_PLUGIN(QJpegPlugin)\nQ_IMPORT_PLUGIN(QGifPlugin)\nQ_IMPORT_PLUGIN(QWebpPlugin)\nnamespace {\nstruct CiQtResourceInit { CiQtResourceInit() { Q_INIT_RESOURCE(gui_shaders); } };\n[[maybe_unused]] const CiQtResourceInit ciQtResourceInit;\n}\n' > "$ROOT/Telegram/SourceFiles/ci_static_plugins.cpp"
          printf '\nif (WIN32)\n    target_sources(Telegram PRIVATE "${CMAKE_CURRENT_SOURCE_DIR}/SourceFiles/ci_static_plugins.cpp")\n    set_source_files_properties("${CMAKE_CURRENT_SOURCE_DIR}/SourceFiles/ci_static_plugins.cpp" PROPERTIES SKIP_PRECOMPILE_HEADERS ON)\nendif()\n' >> "$ROOT/Telegram/CMakeLists.txt"
          echo "--- ci_static_plugins.cpp ---"; cat "$ROOT/Telegram/SourceFiles/ci_static_plugins.cpp"
          echo "--- Telegram/CMakeLists.txt tail ---"; tail -6 "$ROOT/Telegram/CMakeLists.txt" || true

      - name: Telegram Desktop build.
        if: env.ONLY_CACHE == 'false'
        run: |
          cd %TBUILD%\%REPO_NAME%\Telegram

          call configure.bat ^
          -D CMAKE_POLICY_DEFAULT_CMP0218=OLD ^
          %TDESKTOP_BUILD_GENERATOR% ^
          %TDESKTOP_BUILD_ARCH% ^
          ${{ matrix.qt }} ^
          %TDESKTOP_BUILD_API% ^
          -D CMAKE_CONFIGURATION_TYPES=Release ^
          -D CMAKE_COMPILE_WARNING_AS_ERROR=ON ^
          -D CMAKE_MSVC_DEBUG_INFORMATION_FORMAT= ^
          -D DESKTOP_APP_DISABLE_AUTOUPDATE=OFF ^
          -D DESKTOP_APP_DISABLE_CRASH_REPORTS=OFF ^
          %TDESKTOP_BUILD_DEFINE%

          cmake --build ..\out --config Release --parallel 2

      - name: Move artifact.
        if: (env.UPLOAD_ARTIFACT == 'true') || (github.ref == 'refs/heads/nightly')
        run: |
          set OUT=%TBUILD%\%REPO_NAME%\out\Release
          mkdir artifact
          move %OUT%\AyuGram.exe artifact/
          move %OUT%\Updater.exe artifact/
      - uses: actions/upload-artifact@v7
        name: Upload artifact.
        if: (env.UPLOAD_ARTIFACT == 'true') || (github.ref == 'refs/heads/nightly')
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: artifact\
